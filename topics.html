<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Topics | Aapke Sarthi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="logo-link">
            <div class="logo">AAPKE SARTHI</div>
        </a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About VKS Sir</a></li>
            <li><a href="sections.html" class="active-link">Start Learning</a></li>
            <li><a href="resources-page.html">RESOURCES</a></li>
            <li><a href="#footer">Contact</a></li>
        </ul>
    </nav>

    <main class="container">
        <div class="breadcrumb">
            <a href="chapters.html">← Back to Chapters</a>
        </div>
        
        <div class="topic-header">
            <h1 id="chapterTitle">Chapter Name</h1>
            <p class="subtitle">Quickly access PDF Questions, PPT Solutions, and Video Lectures.</p>
        </div>

        <div id="topicList" class="topic-stack">
            </div>
    </main>

    <footer id="footer">
        <div class="footer-content">
            <h3>Aapke Sarthi</h3>
            <p>IIT-JEE Mathematics by VKS Sir</p>
        </div>
    </footer>

    <script>
        // Data logic remains the same (The 10 topics per chapter you requested)
        const topicData = {
            "Straight Line": ["Distance & Section Formula", "Centroid, Incenter & Orthocenter", "Slope & Angle between Lines", "Forms of Equation of Line", "Distance of Point from Line", "Concurrency of Lines", "Angle Bisectors", "Family of Lines", "Locus Problems", "Pair of Straight Lines"],
            "Circle": ["Standard Equations", "Point Power & Position", "Line & Circle Interaction", "Tangent Equations", "Normal Equations", "Length of Tangent & Chord", "Chord of Contact", "Director Circle", "Common Tangents", "Family of Circles"],
            "Quadratic Equations": ["Nature of Roots", "Relation between Roots & Coeff", "Common Roots", "Location of Roots", "Transformation of Equations", "Maximum & Minimum Value", "Descartes' Rule of Signs", "Quadratic Inequalities", "Theory of Equations", "Range of Rational Functions"],
            // ... (All other chapters from previous data block go here)
        };

        const chapterName = localStorage.getItem('selectedChapter') || "Straight Line";
        document.getElementById('chapterTitle').innerText = chapterName;

        const listContainer = document.getElementById('topicList');
        const topics = topicData[chapterName] || Array.from({length: 10}, (_, i) => `Topic ${i + 1}`);

        topics.forEach((topic, index) => {
            const card = document.createElement('div');
            card.className = 'topic-item';
            
            // Note: Replace '#' with your actual Drive/YouTube links later
            card.innerHTML = `
                <div class="topic-main">
                    <span class="topic-num">${index + 1}</span>
                    <h3>${topic}</h3>
                </div>
                <div class="resource-group">
                    <a href="#" class="res-btn dpp-btn" title="Download DPP">📄 DPP</a>
                    <a href="#" class="res-btn ppt-btn" title="View PPT">📊 PPT</a>
                    <a href="#" class="res-btn yt-btn" title="Watch Video">▶ Video</a>
                </div>
            `;
            listContainer.appendChild(card);
        });
    </script>

</body>
</html>
