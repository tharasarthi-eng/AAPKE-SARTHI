        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>

    <main class="container">
        <div class="breadcrumb">
            <a href="sections.html">← Back to Sections</a>
        </div>
        
        <h1 id="sectionTitle">Chapters</h1>
        <p>Select a chapter to view topic-wise solutions and DPPs.</p>

        <div id="chapterList" class="chapter-grid"></div>
    </main>

    <footer id="footer">
        <div class="footer-content">
            <h3>Aapke Sarthi</h3>
            <div class="social-links">
                <a href="#">YouTube</a>
                <a href="#">Telegram</a>
                <a href="#">Instagram</a>
            </div>
        </div>
    </footer>

    <script>
        // 1. Your Chapter Data
        const data = {
            "Geometry": ["Straight Line", "Circle", "Parabola", "Ellipse", "Hyperbola", "Vector", "3D"],
            "Calculus": ["Set Theory", "Relation", "Function", "Inverse Trigonometry", "Limit, Continuity & Differentiability", "Method of Differentiation", "Application of Derivatives", "Integration (Indefinite)", "Integration (Definite)", "Application of Integration", "Differential Equation"],
            "Algebra": ["Quadratic Equations", "Trigonometry Ratio & Equations", "Sequence & Series", "Binomial Theorem", "Permutations & Combinations", "Probability", "Matrices", "Determinants", "Complex Numbers", "Statistics"],
            "Miscellaneous": ["Short Tricks", "Calculations", "Special Series"]
        };

        // 2. Logic to display the right chapters
        const sectionName = localStorage.getItem('selectedSection') || "Geometry";
        document.getElementById('sectionTitle').innerText = sectionName + " Chapters";

        const listContainer = document.getElementById('chapterList');
        const chapters = data[sectionName];

        chapters.forEach(chapter => {
            const card = document.createElement('div');
            card.className = 'chapter-card';
            card.innerHTML = `
                <h3>${chapter}</h3>
                <span>View Topics →</span>
            `;
            card.onclick = () => {
                localStorage.setItem('selectedChapter', chapter);
                window.location.href = 'topics.html';
            };
            listContainer.appendChild(card);
        });
    </script>

</body>
</html>
    });
</script>
</body>
