<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapters | Aapke Sarthi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   <nav class="navbar">
    <a href="index.html" style="text-decoration: none;">
        <div class="logo">Aapke Sarthi</div>
    </a>
    
    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About VKS Sir</a></li>
        <li><a href="sections.html">Start Learning</a></li>
        <li><a href="resources-page.html">RESOURCES</a></li>
        <li><a href="#footer">Contact</a></li>
    </ul>
</nav>
    
<div class="container">
    <header class="page-header">
        <button onclick="location.href='sections.html'" class="back-btn">← Back to Sections</button>
        <h1 id="sectionTitle">Loading...</h1>
        <p>Select a chapter to see topics</p>
    </header>

    <div id="chapterGrid" class="grid-list">
        </div>
</div>

<script>
    // 1. The Data Mapping
    const chapterData = {
        "Geometry": ["Straight line", "Circle", "Parabola", "Ellipse", "Hyperbola", "Vector", "3D"],
        "Calculus": [
            "Set theory", "Relation", "Function", "Inverse trigonometry function", 
            "Limit, continuity and differentiability", "Method of differentiation", 
            "Application Of Derivatives", "Integration (indefinite)", 
            "Integration (definite)", "Application of integration", "Differentiatial equation"
        ],
        "Algebra": [
            "Quadratic equations", "Trigonometry ration and equtions", 
            "Sequence and series", "Binomial theorem", 
            "Permutations and combinations", "Probability", 
            "Matrices", "Determinants", "Complex", "Statistics"
        ],
        "Miscellaneous": ["General Maths", "Logarithms"]
    };

    // 2. Get the saved section from memory
    const selectedSection = localStorage.getItem('selectedSection') || "Geometry";
    document.getElementById('sectionTitle').innerText = selectedSection;

    // 3. Display the Chapters
    const grid = document.getElementById('chapterGrid');
    const chapters = chapterData[selectedSection];

    chapters.forEach(chap => {
        const btn = document.createElement('button');
        btn.className = 'list-item-btn';
        btn.innerHTML = `<span>${chap}</span> <span class="arrow">→</span>`;
        
        btn.onclick = () => {
            // Save the chapter name for the topics page
            localStorage.setItem('selectedChapter', chap);
            window.location.href = 'topics.html';
        };
        
        grid.appendChild(btn);
    });
</script>
</body>
</html>
