    <nav class="navbar">

    <div class="resource-card-container">
        <div class="resource-header">
            <h2 id="finalTopic">Topic Name</h2>
            <p id="pathTracker" class="breadcrumb"></p>

        <div class="button-stack">
            <a href="#" target="_blank" class="res-link dpp-btn">

            <a href="#" target="_blank" class="res-link ppt-btn">

    </div>

    <script>
        const sec = localStorage.getItem('selectedSection');
        const chap = localStorage.getItem('selectedChapter');
        const top = localStorage.getItem('selectedTopic');

        document.getElementById('finalTopic').innerText = top;
        document.getElementById('pathTracker').innerText = `${sec} > ${chap}`;
